<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Model Architecture Viewer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="sidebar">
        <header class="app-header">
          <h1>Model Arch Viewer</h1>
          <p class="app-desc">模型架构、流向与 Shape 可视化</p>
        </header>

        <section class="model-section">
          <div class="section-head">
            <h2>模型目录</h2>
            <span id="model-count" class="pill">0</span>
          </div>
          <input id="model-search" class="search-input" type="search" placeholder="输入模型名或架构名" />
          <div id="model-list" class="model-list"></div>
        </section>

        <section class="controls-section">
          <div class="section-head">
            <h2>运行参数</h2>
            <button id="refresh-button" class="ghost-button" type="button">刷新</button>
          </div>
          <form id="controls-form" class="controls-form"></form>
        </section>

        <div class="sidebar-messages">
          <section id="warnings-panel" class="warnings-panel"></section>
        </div>
      </aside>

      <main class="main-canvas-area">
        <header class="canvas-header">
          <div id="status-bar" class="status-bar">正在加载模型目录...</div>
          <input id="node-search" class="node-search-input" type="search" placeholder="搜索节点..." />
          <div class="graph-actions floating-toolbar">
            <div id="hierarchy-toolbar" class="hierarchy-toolbar" hidden>
              <span class="hierarchy-label">层级视图</span>
              <button class="hierarchy-button is-active" type="button" data-hierarchy-mode="summary">汇总</button>
              <button class="hierarchy-button" type="button" data-hierarchy-mode="block">Q/K/V/Causal</button>
              <button class="hierarchy-button" type="button" data-hierarchy-mode="repeat">重复 N 层</button>
            </div>
            <button id="export-audit-button" class="ghost-button action-btn" type="button" disabled>审计 MD</button>
            <button id="export-json-button" class="ghost-button action-btn" type="button" disabled>JSON</button>
            <button id="export-svg-button" class="ghost-button action-btn" type="button" disabled>SVG</button>
            <button id="share-view-button" class="ghost-button action-btn" type="button" disabled>复制链接</button>
          </div>
        </header>

        <div class="view-tabs" role="tablist" aria-label="中心视图">
          <button class="view-tab is-active" type="button" data-view="graph" role="tab" aria-selected="true">架构图</button>
          <button class="view-tab" type="button" data-view="details" role="tab" aria-selected="false">模型详情</button>
          <button class="view-tab" type="button" data-view="scenario" role="tab" aria-selected="false">部署估算</button>
          <button class="view-tab" type="button" data-view="insights" role="tab" aria-selected="false">专项分析</button>
          <button class="view-tab" type="button" data-view="audit" role="tab" aria-selected="false">计算审计</button>
          <button class="view-tab" type="button" data-view="compare" role="tab" aria-selected="false">A/B 对比</button>
        </div>

        <div id="view-stage" class="view-stage">
          <div id="graph-view" class="view-pane">
            <div id="graph-scroll" class="graph-scroll">
              <div id="graph-canvas" class="graph-canvas">
                <svg id="edge-layer" class="edge-layer" aria-hidden="true"></svg>
                <div id="graph-board" class="graph-board"></div>
              </div>
            </div>
            <div id="zoom-controls" class="zoom-controls">
              <button id="zoom-out" class="zoom-btn" type="button" title="缩小" aria-label="缩小">−</button>
              <span id="zoom-level" class="zoom-level">100%</span>
              <button id="zoom-in" class="zoom-btn" type="button" title="放大" aria-label="放大">+</button>
              <button id="zoom-reset" class="zoom-btn" type="button" title="重置" aria-label="重置缩放">⟲</button>
            </div>
          </div>

          <div id="details-view" class="view-pane" hidden>
            <section id="model-summary" class="summary-panel center-summary"></section>
          </div>

          <div id="scenario-view" class="view-pane" hidden>
            <section id="scenario-panel" class="scenario-panel center-scenario"></section>
          </div>

          <div id="insights-view" class="view-pane" hidden>
            <section id="insights-panel" class="insights-panel center-insights"></section>
          </div>

          <div id="audit-view" class="view-pane" hidden>
            <section id="audit-panel" class="audit-panel center-audit"></section>
          </div>

          <div id="compare-view" class="view-pane" hidden>
            <section id="compare-section" class="compare-section center-compare">
              <div class="section-head">
                <h2>A/B 对比</h2>
                <button id="compare-clear" class="ghost-button" type="button" hidden>清除</button>
              </div>
              <select id="compare-select" class="control-input"></select>
              <div id="compare-body" class="compare-body"></div>
            </section>
          </div>
        </div>
      </main>

      <aside id="detail-panel" class="detail-panel"></aside>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
